<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#04060b;--card:#080c14;--card2:#0c1220;--border:#151d2e;--border2:#1c2840;--t1:#f0f2f5;--t2:#b8c0cc;--t3:#6e7a8a;--red:#e53e3e;--orange:#ed8936;--yellow:#ecc94b;--green:#38a169;--blue:#3182ce;--purple:#805ad5;--cyan:#0bc5ea}
body{background:var(--bg);color:var(--t2);font-family:'DM Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.mono{font-family:'DM Mono',monospace}

/* NAV */
nav{display:flex;align-items:center;padding:0 28px;height:52px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red),0 0 4px var(--red)}
.logo-text{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.tabs{display:flex;gap:2px;margin-left:auto;background:var(--bg);border-radius:8px;padding:3px}
.tab{padding:7px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:#94a3b8;transition:all .2s;user-select:none}
.tab:hover{color:#e2e8f0}
.tab.on{background:var(--card2);color:#f0f2f5;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.badge{font-size:8px;font-weight:700;padding:3px 8px;border-radius:12px;letter-spacing:.5px}

/* SCREENS */
.scr{display:none;padding:22px 28px;animation:fadeIn .3s}
.scr.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* FEED */
.feed{height:30px;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;position:relative;margin-bottom:18px}
.feed-badge{position:absolute;left:0;top:0;bottom:0;width:80px;background:linear-gradient(90deg,var(--card) 65%,transparent);z-index:2;display:flex;align-items:center;padding-left:12px;gap:6px}
.feed-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;box-shadow:0 0 8px var(--green)}
.feed-scroll{display:flex;gap:48px;align-items:center;height:100%;animation:scroll 50s linear infinite;white-space:nowrap;padding-left:85px}
@keyframes scroll{0%{transform:translateX(80%)}100%{transform:translateX(-220%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* CARDS */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:18px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.section-label{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px}
.kpi{background:var(--card2);border-radius:10px;padding:14px 16px;border:1px solid var(--border);transition:all .2s}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi-val{font-size:26px;font-weight:700;line-height:1;margin-top:6px}
.kpi-label{font-size:10px;color:var(--t3);margin-top:4px}
.sub{font-size:9px;color:var(--t3)}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border2)}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:11px;transition:background .1s}
tr:hover td{background:var(--card2)}
.s-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 9px;border-radius:5px}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.g-dash{display:grid;grid-template-columns:250px 1fr 290px;grid-template-rows:auto auto;gap:14px}
.g-geo{display:grid;grid-template-columns:230px 1fr;gap:16px}

/* BARS */
.bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-in{height:100%;border-radius:3px;transition:width .6s ease}
.bt-bar{height:16px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}

/* LIST */
.li{padding:9px 14px;cursor:pointer;border-bottom:1px solid #0a0f1a;border-left:3px solid transparent;transition:all .12s}
.li:hover{background:var(--card2)}
.li.on{background:var(--card2);border-left-color:currentColor}

/* ALERTS */
.alert-new{font-size:7px;font-weight:800;color:#fff;background:var(--red);padding:1px 5px;border-radius:8px;animation:alertPulse 2s infinite;margin-left:6px;vertical-align:middle}
.alert-up{font-size:7px;font-weight:800;color:#fff;background:var(--orange);padding:1px 5px;border-radius:8px;margin-left:6px;vertical-align:middle}
.alert-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:alertPulse 1.5s infinite;display:inline-block;margin-right:4px;box-shadow:0 0 8px var(--red)}
@keyframes alertPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.15)}}
.alert-banner{background:#2d0a0a;border:1px solid var(--red);border-radius:8px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;animation:fadeIn .3s}
.alert-banner-text{font-size:11px;color:var(--t1);flex:1}
.alert-count{font-size:18px;font-weight:800;color:var(--red);font-family:'DM Mono',monospace}

/* FLOW */
.fl-box{background:var(--card);border-radius:12px;border:1px solid;padding:14px 20px;cursor:pointer;transition:all .2s}
.fl-box:hover{transform:translateX(2px)}
.fl-step{display:flex;gap:12px;background:var(--card2);border-radius:8px;padding:12px 14px;margin-top:8px;border-left:3px solid}
.fl-conn{display:flex;justify-content:center;padding:3px 0}
.fl-line{width:2px;height:20px}

/* COMPARE */
.cmp{flex:1;background:var(--card2);border-radius:10px;padding:18px;border-left:4px solid}

/* FOOTER */
.foot{text-align:center;margin-top:18px;padding:10px 0;border-top:1px solid var(--border)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* TOOLTIP */
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1a2332;color:var(--t2);padding:4px 8px;border-radius:4px;font-size:9px;white-space:nowrap;z-index:10;border:1px solid var(--border2)}
</style>
</head>

    <div style="width:24px;text-align:center">${breach?'⚠':''}</div>
  </div>`;
}

if(wAlpha>50){sigStr="STRONG";sigCol="var(--green)"}
else if(wAlpha>20){sigStr="MODERATE";sigCol="var(--yellow)"}
else if(wAlpha>5){sigStr="WEAK";sigCol="var(--orange)"}
else{sigStr="NEGLIGIBLE";sigCol="var(--t3)"}

// Action
let action;
if(stage>=4&&wAlpha>15){action=`<b style="color:var(--red)">ACTIONABLE</b> — Recall virtually certain. Expected cost $${wCost.toFixed(0)}M. Alpha ${wAlpha.toFixed(0)}bps over ${trajMo||'?'}-month horizon.${wCov>.1?' <b>Check bond exposure — '+Math.round(wCov*100)+'% covenant breach risk.</b>':''} Consider: short equity / buy CDS / reduce credit exposure.`}

else{action=`<b style="color:var(--t3)">PASSIVE</b> — Low immediate risk. Review on stage change.`}

<div style="background:var(--card);border-radius:12px;border:2px solid var(--yellow);padding:16px 20px;text-align:center"><div style="font-size:13px;font-weight:700;color:var(--yellow);letter-spacing:1px;margin-bottom:8px">OUTPUT → DASHBOARD</div><div style="display:flex;justify-content:center;gap:28px">${[{l:"Overview",d:"Industry macro"},{l:"Vehicle Analysis",d:"Intelligence card"},{l:"Geographic",d:"Root cause"},{l:"Methodology",d:"This page"}].map(o=>`<div><div style="font-size:11px;font-weight:700;color:var(--t1)">${o.l}</div><div class="sub">${o.d}</div></div>`).join('')}</div></div>
</div>
<div class="foot"><div class="sub">RecallVantage v1.0 — Epidemiological surveillance for automotive safety</div></div>`;
}

function toggleFL(id){const el=document.getElementById('fld-'+id);if(expFlow===id){el.style.display='none';expFlow=null}else{if(expFlow)document.getElementById('fld-'+expFlow).style.display='none';el.style.display='block';expFlow=id}}

function go(n){
curScr=n;
document.querySelectorAll('.scr').forEach((s,i)=>{s.classList.toggle('on',i===n)});
document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('on',i===n)});
[buildS0,buildS1,buildS2,buildS3Fusion][n]();
}

buildS0();buildS1();buildS2();buildS3Fusion();
</script>
